<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TorNumber - Bangladesh Phone Number Intelligence</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <style>
        body {
            background: linear-gradient(135deg, #0f0c29 0%, #1a1a3e 50%, #24243e 100%);
            min-height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
        }
        .btn-search {
            background: linear-gradient(135deg, #8b5cf6 0%, #6d28d9 100%);
            transition: all 0.2s ease;
        }
        .btn-search:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px -5px rgba(139, 92, 246, 0.4);
        }
        .risk-safe { background: #10b981; }
        .risk-suspicious { background: #f59e0b; }
        .risk-spam { background: #ef4444; }
        .risk-high-risk { background: #7c3aed; }
        .skeleton {
            background: linear-gradient(90deg, rgba(255,255,255,0.05) 25%, rgba(255,255,255,0.1) 50%, rgba(255,255,255,0.05) 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
        }
        @keyframes shimmer {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade {
            animation: fadeIn 0.4s ease-out;
        }
        input:focus {
            outline: none;
            border-color: #8b5cf6;
        }
    </style>
</head>
<body class="text-white">
    <!-- Navbar -->
    <nav class="fixed w-full bg-black/30 backdrop-blur-md border-b border-white/10 z-50">
        <div class="max-w-4xl mx-auto px-6 py-4">
            <div class="flex items-center justify-between">
                <div class="flex items-center space-x-3">
                    <div class="w-10 h-10 bg-gradient-to-r from-purple-500 to-pink-500 rounded-xl flex items-center justify-center">
                        <i class="fas fa-shield-alt text-white"></i>
                    </div>
                    <span class="text-xl font-bold">TorNumber</span>
                    <span class="text-xs px-2 py-1 bg-green-500/20 text-green-300 rounded-full">Bangladesh</span>
                </div>
                <div class="text-sm text-gray-400">
                    <i class="fas fa-map-marker-alt text-green-400"></i> BD Only
                </div>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="pt-28 pb-12">
        <div class="max-w-3xl mx-auto px-6">
            <!-- Hero -->
            <div class="text-center mb-10">
                <h1 class="text-4xl md:text-5xl font-bold mb-3">
                    Phone Number 
                    <span class="bg-gradient-to-r from-purple-400 to-pink-400 bg-clip-text text-transparent">Intelligence</span>
                </h1>
                <p class="text-gray-400">Real-time carrier detection, location tracking & spam analysis</p>
            </div>

            <!-- Search Box -->
            <div class="glass-card p-2 mb-6">
                <div class="flex gap-2">
                    <div class="flex-1 relative">
                        <i class="fas fa-search absolute left-4 top-1/2 transform -translate-y-1/2 text-gray-500"></i>
                        <input type="tel" 
                               id="phoneInput"
                               placeholder="01712345678 or +8801712345678" 
                               class="w-full pl-11 pr-4 py-4 bg-transparent border-0 focus:outline-none text-white placeholder-gray-500">
                    </div>
                    <button id="searchBtn" class="btn-search px-8 py-4 rounded-xl font-semibold text-white disabled:opacity-50">
                        <span id="btnText">Analyze</span>
                        <span id="btnLoading" class="hidden"><i class="fas fa-spinner fa-spin"></i> Analyzing...</span>
                    </button>
                </div>
            </div>
            
            <p class="text-center text-gray-500 text-xs mb-8">
                <i class="fas fa-info-circle"></i> Supports: 017, 018, 019, 013, 014, 015, 016
            </p>

            <!-- Results -->
            <div id="results" class="hidden"></div>
        </div>
    </main>

    <!-- Toast -->
    <div id="toast" class="fixed bottom-4 right-4 z-50"></div>

    <script>
        // DOM Elements
        const phoneInput = document.getElementById('phoneInput');
        const searchBtn = document.getElementById('searchBtn');
        const resultsDiv = document.getElementById('results');
        const btnText = document.getElementById('btnText');
        const btnLoading = document.getElementById('btnLoading');
        const toastDiv = document.getElementById('toast');

        function showToast(message, type = 'info') {
            const colors = { success: 'bg-green-500', error: 'bg-red-500', info: 'bg-blue-500' };
            const toast = document.createElement('div');
            toast.className = `${colors[type]} text-white px-4 py-2 rounded-lg shadow-lg mb-2 text-sm`;
            toast.innerHTML = message;
            toastDiv.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }

        function showSkeleton() {
            resultsDiv.classList.remove('hidden');
            resultsDiv.innerHTML = `
                <div class="glass-card p-6">
                    <div class="flex items-center space-x-4">
                        <div class="skeleton w-16 h-16 rounded-full"></div>
                        <div class="flex-1">
                            <div class="skeleton h-5 w-32 rounded mb-2"></div>
                            <div class="skeleton h-4 w-48 rounded"></div>
                        </div>
                    </div>
                    <div class="mt-4 space-y-2">
                        <div class="skeleton h-4 w-full rounded"></div>
                        <div class="skeleton h-4 w-3/4 rounded"></div>
                    </div>
                </div>
            `;
        }

        async function searchNumber() {
            const phoneNumber = phoneInput.value.trim();
            
            if (!phoneNumber) {
                showToast('Please enter a phone number', 'error');
                return;
            }
            
            searchBtn.disabled = true;
            btnText.classList.add('hidden');
            btnLoading.classList.remove('hidden');
            showSkeleton();
            
            try {
                const response = await fetch('/api/lookup', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ phoneNumber })
                });
                
                const result = await response.json();
                
                if (!result.success) {
                    throw new Error(result.error);
                }
                
                displayResult(result.data);
                showToast('Analysis complete!', 'success');
                
            } catch (error) {
                showToast(error.message, 'error');
                resultsDiv.classList.add('hidden');
            } finally {
                searchBtn.disabled = false;
                btnText.classList.remove('hidden');
                btnLoading.classList.add('hidden');
            }
        }

        function displayResult(data) {
            const riskClass = `risk-${data.riskLevel.toLowerCase().replace(' ', '-')}`;
            
            const html = `
                <div class="glass-card p-6 animate-fade">
                    <div class="flex items-center gap-5 pb-5 border-b border-white/10">
                        <img src="${data.profileImage}" class="w-16 h-16 rounded-full border-2 border-purple-500" onerror="this.src='https://randomuser.me/api/portraits/lego/1.jpg'">
                        <div>
                            <div class="flex items-center gap-3 mb-1">
                                <h2 class="text-xl font-semibold">${data.carrier}</h2>
                                <span class="px-3 py-1 rounded-full text-xs font-semibold text-white ${riskClass}">${data.riskLevel}</span>
                            </div>
                            <p class="text-gray-300 text-lg">${data.formattedNumber}</p>
                            <p class="text-gray-500 text-sm">${data.location}, ${data.countryName}</p>
                        </div>
                    </div>
                    
                    <div class="grid grid-cols-3 gap-4 py-5 border-b border-white/10">
                        <div>
                            <p class="text-gray-500 text-xs">Carrier</p>
                            <p class="font-semibold">${data.carrier}</p>
                        </div>
                        <div>
                            <p class="text-gray-500 text-xs">Spam Score</p>
                            <div class="flex items-center gap-2">
                                <div class="flex-1 bg-gray-700 rounded-full h-1.5 max-w-20">
                                    <div class="bg-yellow-500 rounded-full h-1.5" style="width: ${data.spamScore}%"></div>
                                </div>
                                <span class="text-sm">${data.spamScore}%</span>
                            </div>
                        </div>
                        <div>
                            <p class="text-gray-500 text-xs">Confidence</p>
                            <p class="font-semibold">${data.confidence}</p>
                        </div>
                    </div>
                    
                    <div class="py-5 border-b border-white/10">
                        <p class="text-gray-500 text-xs mb-2">AI Analysis</p>
                        <p class="text-gray-300 text-sm leading-relaxed">${data.aiInsight}</p>
                    </div>
                    
                    <div class="grid grid-cols-3 gap-3 pt-5">
                        <a href="${data.whatsappLink}" target="_blank" class="text-center py-2 rounded-lg bg-emerald-500/20 hover:bg-emerald-500/30 transition text-emerald-400 text-sm">
                            <i class="fab fa-whatsapp"></i> WhatsApp
                        </a>
                        <a href="${data.telegramLink}" target="_blank" class="text-center py-2 rounded-lg bg-blue-500/20 hover:bg-blue-500/30 transition text-blue-400 text-sm">
                            <i class="fab fa-telegram"></i> Telegram
                        </a>
                        <button onclick="copyNumber('${data.formattedNumber}')" class="text-center py-2 rounded-lg bg-gray-500/20 hover:bg-gray-500/30 transition text-gray-400 text-sm">
                            <i class="fas fa-copy"></i> Copy
                        </button>
                    </div>
                </div>
            `;
            
            resultsDiv.innerHTML = html;
        }

        function copyNumber(number) {
            navigator.clipboard.writeText(number);
            showToast('Copied!', 'success');
        }

        // Event listeners
        searchBtn.addEventListener('click', searchNumber);
        phoneInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') searchNumber();
        });
        
        console.log('App loaded. Ready to search!');
    </script>
</body>
</html>
