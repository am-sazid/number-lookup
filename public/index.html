<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TorNumber - AI Number Intelligence System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link rel="stylesheet" href="/css/style.css">
</head>
<body class="bg-gradient-to-br from-purple-600 via-pink-600 to-orange-600 min-h-screen">
    <!-- Navbar -->
    <nav class="bg-white/90 dark:bg-gray-900/90 backdrop-blur-md shadow-lg fixed w-full z-50">
        <div class="container mx-auto px-6 py-4">
            <div class="flex items-center justify-between">
                <div class="flex items-center space-x-3">
                    <div class="w-10 h-10 bg-gradient-to-r from-purple-600 to-pink-600 rounded-lg flex items-center justify-center animate-pulse">
                        <i class="fas fa-shield-alt text-white"></i>
                    </div>
                    <span class="text-2xl font-bold bg-gradient-to-r from-purple-600 to-pink-600 bg-clip-text text-transparent">
                        TorNumber
                    </span>
                    <span class="text-xs bg-green-500 text-white px-2 py-1 rounded-full">AI-Powered</span>
                </div>
                <div class="flex items-center space-x-4">
                    <button id="darkModeBtn" class="p-2 rounded-lg bg-gray-100 dark:bg-gray-800 hover:bg-gray-200 transition">
                        <i class="fas fa-moon dark:hidden"></i>
                        <i class="fas fa-sun hidden dark:inline"></i>
                    </button>
                </div>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="pt-32 pb-12">
        <div class="container mx-auto px-6">
            <!-- Hero Section -->
            <div class="text-center mb-12 animate-fade-in-up">
                <div class="inline-block px-4 py-2 bg-white/20 backdrop-blur rounded-full text-white text-sm font-semibold mb-4">
                    🔥 Real-time Number Intelligence
                </div>
                <h1 class="text-5xl md:text-7xl font-bold text-white mb-4">
                    Know the Number<br>
                    <span class="bg-gradient-to-r from-yellow-400 to-orange-500 bg-clip-text text-transparent">
                        Before You Trust It
                    </span>
                </h1>
                <p class="text-xl text-white/80 max-w-2xl mx-auto">
                    Real-time carrier detection • Location tracking • Platform verification • AI insights
                </p>
                <div class="flex justify-center space-x-4 mt-4">
                    <span class="text-white/60 text-sm"><i class="fab fa-whatsapp text-green-400"></i> WhatsApp</span>
                    <span class="text-white/60 text-sm"><i class="fab fa-telegram text-blue-400"></i> Telegram</span>
                    <span class="text-white/60 text-sm"><i class="fas fa-map-marker-alt text-red-400"></i> Geolocation</span>
                </div>
            </div>

            <!-- Search Box -->
            <div class="max-w-2xl mx-auto mb-12">
                <div class="bg-white/10 backdrop-blur-md rounded-2xl p-2 shadow-2xl">
                    <div class="flex flex-col md:flex-row gap-2">
                        <div class="flex-1 relative">
                            <i class="fas fa-search absolute left-4 top-1/2 transform -translate-y-1/2 text-white/50"></i>
                            <input type="tel" 
                                   id="phoneInput"
                                   placeholder="Enter phone number (e.g., 01712345678 or +8801712345678)" 
                                   class="w-full px-12 py-4 bg-white/20 rounded-xl text-white placeholder-white/50 focus:outline-none focus:ring-2 focus:ring-purple-400">
                        </div>
                        <button id="searchBtn" 
                                class="px-8 py-4 bg-gradient-to-r from-purple-600 to-pink-600 text-white rounded-xl font-semibold hover:shadow-lg transition transform hover:scale-105">
                            <span id="btnText"><i class="fas fa-robot mr-2"></i>Analyze Number</span>
                            <span id="btnLoading" class="hidden"><i class="fas fa-spinner fa-spin mr-2"></i>Analyzing...</span>
                        </button>
                    </div>
                    <p class="text-white/50 text-xs text-center mt-2">
                        <i class="fas fa-globe"></i> Works without country code • Auto-detects location
                    </p>
                </div>
            </div>

            <!-- Results Container -->
            <div id="results" class="max-w-4xl mx-auto hidden"></div>
        </div>
    </main>

    <!-- Toast Container -->
    <div id="toastContainer" class="fixed bottom-4 right-4 z-50 space-y-2"></div>

    <script src="/js/app.js"></script>
</body>
</html>
